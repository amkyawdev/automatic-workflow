<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Automatic Workflow</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/tokens.css">
    <link rel="stylesheet" href="styles/components.css">
</head>
<body>
    <div id="app" class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">⚡</span>
                    <span class="logo-text">AutoFlow</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-item active">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="/workflows.html" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span>Workflows</span>
                </a>
                <a href="/integrations.html" class="nav-item">
                    <span class="nav-icon">🔗</span>
                    <span>Integrations</span>
                </a>
                <a href="/settings.html" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    <span>Settings</span>
                </a>
                <a href="/help.html" class="nav-item">
                    <span class="nav-icon">❓</span>
                    <span>Help</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="user-avatar">U</div>
                    <div class="user-details">
                        <span class="user-name">User</span>
                        <span class="user-plan">Free Plan</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Dashboard</h1>
                <button class="btn btn-primary">
                    <span>+</span> New Workflow
                </button>
            </header>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">⚙️</div>
                    <div class="stat-info">
                        <span class="stat-value" id="total-workflows">0</span>
                        <span class="stat-label">Total Workflows</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">✅</div>
                    <div class="stat-info">
                        <span class="stat-value" id="total-executions">0</span>
                        <span class="stat-label">Total Executions</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📈</div>
                    <div class="stat-info">
                        <span class="stat-value" id="success-rate">0%</span>
                        <span class="stat-label">Success Rate</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">💰</div>
                    <div class="stat-info">
                        <span class="stat-value" id="executions-used">0/100</span>
                        <span class="stat-label">Executions Used</span>
                    </div>
                </div>
            </div>

            <!-- Recent Activity -->
            <section class="section">
                <h2 class="section-title">Recent Activity</h2>
                <div id="activity-list" class="activity-list">
                    <div class="empty-state">
                        <p>No recent activity. Create your first workflow to get started!</p>
                    </div>
                </div>
            </section>

            <!-- Quick Actions -->
            <section class="section">
                <h2 class="section-title">Quick Actions</h2>
                <div class="quick-actions">
                    <button class="quick-action-card">
                        <span class="qa-icon">🚀</span>
                        <span class="qa-label">Create Workflow</span>
                    </button>
                    <button class="quick-action-card">
                        <span class="qa-icon">🔗</span>
                        <span class="qa-label">Add Integration</span>
                    </button>
                    <button class="quick-action-card">
                        <span class="qa-icon">📊</span>
                        <span class="qa-label">View Analytics</span>
                    </button>
                    <button class="quick-action-card">
                        <span class="qa-icon">❓</span>
                        <span class="qa-label">Get Help</span>
                    </button>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="scripts/core/app.js"></script>
</body>
</html>
